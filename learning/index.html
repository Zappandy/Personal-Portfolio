  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });

    const PAGE_SIZE = 7;
    function initPagination() {
      const cards = Array.from(document.querySelectorAll('.post-card'));
      if (cards.length <= PAGE_SIZE) return;
      let page = 0;
      const totalPages = Math.ceil(cards.length / PAGE_SIZE);

      const controls = document.createElement('div');
      controls.style.cssText = 'display:flex;gap:0.75rem;margin-top:1.5rem;align-items:center;';
      const prev = document.createElement('button');
      const next = document.createElement('button');
      const label = document.createElement('span');
      [prev, next].forEach(btn => {
        btn.style.cssText = 'font-family:var(--mono);font-size:0.8rem;padding:0.3rem 0.8rem;border-radius:var(--radius-pill);border:1px solid rgba(0,0,0,0.15);background:var(--glass-bg);cursor:pointer;color:var(--text);';
      });
      label.style.cssText = 'font-family:var(--mono);font-size:0.78rem;color:var(--muted);';
      prev.textContent = '← prev';
      next.textContent = 'next →';
      controls.append(prev, label, next);
      cards[0].parentElement.appendChild(controls);

      function render() {
        const start = page * PAGE_SIZE;
        cards.forEach((c, i) => c.style.display = (i >= start && i < start + PAGE_SIZE) ? '' : 'none');
        label.textContent = `${page + 1} / ${totalPages}`;
        prev.disabled = page === 0;
        next.disabled = page === totalPages - 1;
        prev.style.opacity = prev.disabled ? '0.4' : '1';
        next.style.opacity = next.disabled ? '0.4' : '1';
      }
      prev.addEventListener('click', () => { if (page > 0) { page--; render(); } });
      next.addEventListener('click', () => { if (page < totalPages - 1) { page++; render(); } });
      render();
    }
    initPagination();
  </script>
