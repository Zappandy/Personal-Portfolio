  <style>
    .musings-section {
      min-height: calc(100vh - 56px);
      padding: 5rem 0 4rem;
    }
    .post-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2.5rem;
    }
    /* Individual post card — reuse glass treatment */
    .post-card {
      position: relative;
      overflow: hidden;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--glass-shadow);
      padding: 1.5rem 1.75rem;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      transition: box-shadow 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    .post-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 18% 0%, rgba(255,255,255,0.5) 0%, transparent 52%);
      pointer-events: none;
      border-radius: inherit;
    }
    .post-card:hover {
      box-shadow: var(--glass-shadow-hover);
      transform: translateY(-2px);
    }
    .post-card > * { position: relative; z-index: 1; }
    .post-date {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }
    .post-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }
    .post-preview {
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--muted);
      margin: 0;
    }
    .empty-state {
      color: var(--muted);
      font-size: 0.92rem;
      font-style: italic;
      margin-top: 1rem;
    }
  </style>
</head>
